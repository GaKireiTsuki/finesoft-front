packages:
    - "packages/*"
    - "templates/*"

catalog:
    "@types/node": ^22
    "@vitest/coverage-v8": ^4.1.2
    typescript: ^5.9.3
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: latest
    vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
onlyBuiltDependencies:
    - esbuild
overrides:
    vite: "catalog:"
    vitest: "catalog:"
peerDependencyRules:
    allowAny:
        - vite
        - vitest
    allowedVersions:
        vite: "*"
        vitest: "*"
