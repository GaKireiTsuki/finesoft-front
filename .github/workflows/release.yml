name: Release

on:
    push:
        branches:
            - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
    CI: true
    NPM_CONFIG_PROVENANCE: false
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            actions: write
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: 24
                  cache: true

            - name: Install dependencies
              run: vp install --frozen-lockfile

            - name: Generate auto changeset
              if: "${{ !startsWith(github.event.head_commit.message, 'chore(release): version packages') }}"
              run: vp run release:auto:changeset

            - name: Create release pull request or publish
              id: changesets
              uses: changesets/action@v1
              with:
                  version: vp run version
                  publish: vp run release
                  commit: "chore(release): version packages"
                  title: "chore(release): version packages"
                  createGithubReleases: false
                  commitMode: github-api
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Request required checks for release pull request
              if: "${{ steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != '' }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
              run: |
                  HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName')

                  echo "Dispatching Coverage and CodeQL for release PR #$PR_NUMBER on $HEAD_REF"

                  gh api \
                      --method POST \
                      -H "Accept: application/vnd.github+json" \
                      "/repos/$GITHUB_REPOSITORY/actions/workflows/quality.yml/dispatches" \
                      -f ref="$HEAD_REF"

                  gh api \
                      --method POST \
                      -H "Accept: application/vnd.github+json" \
                      "/repos/$GITHUB_REPOSITORY/actions/workflows/codeql.yml/dispatches" \
                      -f ref="$HEAD_REF"

            - name: Enable auto-merge for release pull request
              if: "${{ steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != '' }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash "${{ steps.changesets.outputs.pullRequestNumber }}"; then
                      echo "Enabled auto-merge for release PR #${{ steps.changesets.outputs.pullRequestNumber }}."
                  else
                      echo "::warning::Could not enable auto-merge for release PR #${{ steps.changesets.outputs.pullRequestNumber }}. Check whether auto-merge is enabled for this repository."
                  fi

            - name: Summarize release result
              if: "${{ always() }}"
              env:
                  HAS_CHANGESETS: ${{ steps.changesets.outputs.hasChangesets }}
                  PUBLISHED: ${{ steps.changesets.outputs.published }}
                  PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
                  PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
              run: |
                  {
                      echo "## Release workflow"
                      echo

                      if [[ "$PUBLISHED" == "true" ]]; then
                          echo "Published packages:"
                          node -e 'const packages = JSON.parse(process.env.PUBLISHED_PACKAGES ?? "[]"); for (const pkg of packages) console.log(`- \`${pkg.name}@${pkg.version}\``);'
                      elif [[ "$HAS_CHANGESETS" == "true" ]]; then
                          echo "Release PR: #$PULL_REQUEST_NUMBER"
                          echo
                          echo "Coverage and CodeQL workflows were dispatched for the release PR branch."
                          echo
                          echo "Auto-merge has been requested for the release PR when repository settings allow it."
                      else
                          echo "No pending changesets were found."
                      fi
                  } >> "$GITHUB_STEP_SUMMARY"
